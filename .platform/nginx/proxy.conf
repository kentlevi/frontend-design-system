# Allow large uploads
client_max_body_size 1024M;

# Ensure Laravel sees the real client IP
real_ip_header X-Forwarded-For;

# Trust the load balancer (ALB/ELB) as the source of X-Forwarded-For
# For maximum security, replace 0.0.0.0/0 with AWS LB CIDR ranges
set_real_ip_from 0.0.0.0/0;